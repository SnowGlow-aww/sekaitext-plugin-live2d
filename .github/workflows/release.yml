name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - name: Verify exact stable tag and versions
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          LOCK_VERSION="$(node -p "require('./package-lock.json').version")"
          LOCK_ROOT_VERSION="$(node -p "require('./package-lock.json').packages[''].version")"
          [[ "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          [ "$VERSION" = "$MANIFEST_VERSION" ]
          [ "$VERSION" = "$LOCK_VERSION" ]
          [ "$VERSION" = "$LOCK_ROOT_VERSION" ]
          [ "$GITHUB_REF_NAME" = "v$VERSION" ]
      - name: Ensure zip is available
        run: command -v zip >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y zip; }
      - run: npm ci
      - run: node --test scripts/publish-market.test.mjs
      - run: npm run dist
      - name: Verify deterministic package bytes
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT="dist-plugins/$(node -p "require('./manifest.json').id + '-' + require('./manifest.json').version + '.sekplugin'")"
          FIRST="$(sha256sum "$ARTIFACT" | cut -d' ' -f1)"
          npm run pack
          [ "$FIRST" = "$(sha256sum "$ARTIFACT" | cut -d' ' -f1)" ]
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sekplugin
          path: dist-plugins/*.sekplugin
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sekplugin
          path: dist-plugins
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          overwrite_files: false
          files: dist-plugins/*.sekplugin

  publish-market:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    environment: plugin-market-signer
    concurrency:
      group: plugin-market-write
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sekplugin
          path: dist-plugins
      - name: Publish and sign from trusted tagged source
        env:
          MANIFEST_REPO_TOKEN: ${{ secrets.MANIFEST_REPO_TOKEN }}
          PLUGIN_SIGNING_PRIVATE_KEY: ${{ secrets.PLUGIN_SIGNING_PRIVATE_KEY }}
          PLUGIN_SIGNING_KEY_ID: ${{ vars.PLUGIN_SIGNING_KEY_ID }}
          SEKAITEXT_PLUGIN_PUBLIC_KEYS: ${{ vars.SEKAITEXT_PLUGIN_PUBLIC_KEYS }}
          MARKET_SEQUENCE: ${{ github.run_id }}
          PLUGIN_HOMEPAGE: https://github.com/SnowGlow-aww/sekaitext-plugin-live2d
        run: node scripts/publish-market.mjs
